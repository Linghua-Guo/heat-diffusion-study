name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  fd-smoke:
    name: FD smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run pytest
        env:
          MPLBACKEND: Agg
        run: |
          pytest -q
